<!DOCTYPE html>

<html>

<head>

    <title>JOS Admin Dashboard</title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>

    <div class="container">

        <h1>
            JOS ADMIN DASHBOARD
        </h1>

        <!-- ONLINE USERS -->
        <div class="card">

            <h2>
                Online Users
            </h2>

            <ul id="onlineUsers"></ul>

        </div>

        <!-- ACTIVE CONNECTIONS -->
        <div class="card">

            <h2>
                Active Connections
            </h2>

            <div id="topology"></div>

        </div>

        <!-- PENDING REQUESTS -->
        <div class="card">

            <h2>
                Pending Requests
            </h2>

            <div id="requests"></div>

        </div>

        <!-- LIVE COMMUNICATION -->
        <div class="card">

            <h2>
                Live Communication Monitor
            </h2>

            <div id="messages"></div>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
