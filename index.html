<!DOCTYPE html>

<html>

<head>

    <title>JOS Admin Dashboard</title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>

    <div class="container">

        <h1>
            JOS ADMIN DASHBOARD
        </h1>

        <!-- ONLINE USERS -->
        <div class="card">

            <h2>Online Users</h2>

            <ul id="onlineUsers"></ul>

        </div>

        <!-- ACTIVE CONNECTIONS -->
        <div class="card">

            <h2>Active Connections</h2>

            <div id="topology"></div>

        </div>

        <!-- PENDING REQUESTS -->
        <div class="card">

            <h2>Pending Requests</h2>

            <div id="requests"></div>

        </div>

        <!-- LIVE COMMUNICATION -->
        <div class="card">

            <h2>Live Communication Monitor</h2>

            <div id="messages"></div>

        </div>

        <!-- HEARTBEAT MONITOR -->
        <div class="card">

            <h2>
                Vehicle Heartbeat Monitor
            </h2>

            <div id="heartbeatContainer">

                No heartbeat received yet...

            </div>

        </div>

        <!-- LIVE TERMINAL -->
        <div class="card">

            <h2>
                Live TBM Terminal
            </h2>

            <div id="terminal">

                JOS Terminal Started...
                <br>

            </div>

        </div>

        <!-- VEHICLE REGISTRY -->
        <div class="card">

            <h2>Vehicle Registry</h2>

            <div class="stats">

                Total Vehicles:
                <span id="vehicleCount">0</span>

            </div>

            <input
                type="text"
                id="vin"
                placeholder="VIN"
            >

            <input
                type="text"
                id="vehicleName"
                placeholder="Vehicle Name"
            >

            <button
                onclick="registerVehicle()"
            >
                Register Vehicle
            </button>

            <button
                onclick="loadVehicles()"
            >
                Refresh Vehicles
            </button>

            <div id="vehicleTable"></div>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
